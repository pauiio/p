            </div>
            <div style={{ padding: "12px 24px", borderBottom: `1px solid ${border}`, display: "flex", gap: 8, overflowX: "auto" }}>
              {["general","departments"].map(t => <button key={t} onClick={() => setAdminTab(t)} style={pill(gold, adminTab === t)}>{t === "general" ? "🏨 Général" : "🍽️ Départements"}</button>)}
            </div>
            <div style={{ padding: 24 }}>
              {adminTab === "general" && (
                <div>
                  <div style={{ fontSize: 11, letterSpacing: 3, color: gold, textTransform: "uppercase", marginBottom: 8 }}>Informations Générales</div>
                  <textarea value={data.general.info} onChange={e => updateGeneralInfo(e.target.value)} rows={5} style={{ ...inputStyle, resize: "vertical", marginBottom: 20 }} />
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                    <div style={{ fontSize: 11, letterSpacing: 3, color: gold, textTransform: "uppercase" }}>Annonces</div>
                    <button onClick={addAnnouncement} style={btnStyle(gold)}>+ Ajouter</button>
                  </div>
                  {data.general.announcements.map((ann, i) => (
                    <div key={i} style={{ ...cardStyle(), marginBottom: 12 }}>
                      <input value={ann.title} onChange={e => updateAnnouncement(i, "title", e.target.value)} style={{ ...inputStyle, marginBottom: 8, fontWeight: 700 }} placeholder="Titre" />
                      <textarea value={ann.body} onChange={e => updateAnnouncement(i, "body", e.target.value)} rows={2} style={{ ...inputStyle, resize: "none", marginBottom: 8 }} placeholder="Contenu" />
                      <button onClick={() => deleteAnnouncement(i)} style={{ ...btnStyle("#C0736A", true), fontSize: 12, padding: "6px 12px" }}>Supprimer</button>
                    </div>
                  ))}
                </div>
              )}
              {adminTab === "departments" && (
                <div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 20 }}>
                    {Object.entries(data.departments).map(([key, dep]) => <button key={key} onClick={() => setAdminDept(key)} style={pill(dep.color, adminDept === key)}>{dep.icon} {dep.label.split(" ")[0]}</button>)}
                  </div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: d.color, marginBottom: 16 }}>{d.icon} {d.label}</div>
                  <div style={{ fontSize: 11, letterSpacing: 3, color: gold, textTransform: "uppercase", marginBottom: 8 }}>Informations</div>
                  <textarea value={d.info} onChange={e => updateDeptInfo(adminDept, e.target.value)} rows={4} style={{ ...inputStyle, resize: "vertical", marginBottom: 20 }} />
                  <div style={{ fontSize: 11, letterSpacing: 3, color: gold, textTransform: "uppercase", marginBottom: 8 }}>Plan de Salle</div>
                  <div style={{ ...cardStyle(d.color), marginBottom: 20 }}>
                    {d.floorPlan ? <img src={d.floorPlan} alt="Plan" style={{ width: "100%", borderRadius: 8, marginBottom: 10 }} /> : <div style={{ textAlign: "center", color: "#666", padding: "20px 0" }}>Aucun plan uploadé</div>}
                    <input type="file" accept="image/*" style={{ display: "none" }} ref={fileInputRef} onChange={e => handleImageUpload(e, adminDept)} />
                    <button onClick={() => fileInputRef.current && fileInputRef.current.click()} style={{ ...btnStyle(d.color), width: "100%", marginTop: 8 }}>📁 {d.floorPlan ? "Changer le plan" : "Uploader un plan"}</button>
                  </div>
                  <div style={{ fontSize: 11, letterSpacing: 3, color: gold, textTransform: "uppercase", marginBottom: 12 }}>Carte / Menu</div>
                  {d.menu.categories.map((cat, ci) => (
                    <div key={ci} style={{ ...cardStyle(d.color), marginBottom: 16 }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: d.color, marginBottom: 12 }}>{cat.name}</div>
                      {cat.items.map((item, ii) => (
                        <div key={ii} style={{ background: "rgba(255,255,255,0.03)", borderRadius: 8, padding: 10, marginBottom: 8 }}>
                          <input value={item.name} onChange={e => updateMenuItem(adminDept, ci, ii, "name", e.target.value)} style={{ ...inputStyle, marginBottom: 6, fontWeight: 700 }} placeholder="Nom" />
                          <input value={item.desc} onChange={e => updateMenuItem(adminDept, ci, ii, "desc", e.target.value)} style={{ ...inputStyle, marginBottom: 6 }} placeholder="Description" />
                          <input value={item.price || ""} onChange={e => updateMenuItem(adminDept, ci, ii, "price", e.target.value)} style={{ ...inputStyle, marginBottom: 6 }} placeholder="Prix" />
                          <input value={item.allergens.join(", ")} onChange={e => updateMenuItem(adminDept, ci, ii, "allergens", e.target.value)} style={{ ...inputStyle, marginBottom: 6 }} placeholder="Allergènes (virgule)" />
                          <button onClick={() => deleteMenuItem(adminDept, ci, ii)} style={{ ...btnStyle("#C0736A", true), fontSize: 11, padding: "5px 10px" }}>Supprimer</button>
                        </div>
                      ))}
                      <button onClick={() => addMenuItem(adminDept, ci)} style={{ ...btnStyle(d.color, true), fontSize: 12, width: "100%" }}>+ Ajouter un plat</button>
                    </div>
                  ))}
                  {["opening","closing"].map(type => (
                    <div key={type} style={{ marginBottom: 20 }}>
                      <div style={{ fontSize: 11, letterSpacing: 3, color: gold, textTransform: "uppercase", marginBottom: 10 }}>Checklist {type === "opening" ? "Ouverture" : "Fermeture"}</div>
                      {d.checklists[type].map((item, i) => (
                        <div key={i} style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                          <input value={item} onChange={e => updateChecklistItem(adminDept, type, i, e.target.value)} style={{ ...inputStyle, flex: 1 }} />
                          <button onClick={() => deleteChecklistItem(adminDept, type, i)} style={{ ...btnStyle("#C0736A", true), padding: "8px 12px", flexShrink: 0 }}>✕</button>
                        </div>
                      ))}
                      <button onClick={() => addChecklistItem(adminDept, type)} style={{ ...btnStyle(d.color, true), fontSize: 12, width: "100%" }}>+ Ajouter</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div style={bottomNav}><button onClick={() => setView("home")} style={{ flex: 1, background: "none", border: "none", color: "#888", cursor: "pointer", fontSize: 12, letterSpacing: 1 }}>← Staff</button></div>
          </div>
        );
      }

      // DEPT DETAIL
      if (view === "dept" && dept) {
        const checkKey = (i) => `${activeDept}-${checklistType}-${i}`;
        const total = dept.checklists[checklistType].length;
        const done = dept.checklists[checklistType].filter((_, i) => checked[checkKey(i)]).length;
        return (
          <div style={wrap}>
            <div style={{ background: `linear-gradient(135deg, ${dept.color}25, ${bg})`, padding: "28px 24px 20px", borderBottom: `1px solid ${dept.color}30` }}>
              <button onClick={() => { setView("home"); setActiveDept(null); }} style={{ background: "none", border: "none", color: gold, cursor: "pointer", fontSize: 12, letterSpacing: 2, textTransform: "uppercase", padding: 0, marginBottom: 16 }}>← Retour</button>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                <div style={{ width: 52, height: 52, borderRadius: 14, background: `${dept.color}22`, border: `1px solid ${dept.color}55`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26 }}>{dept.icon}</div>
                <div><div style={{ fontSize: 11, letterSpacing: 3, color: dept.color, textTransform: "uppercase" }}>Département F&B</div><div style={{ fontSize: 22, fontWeight: 700 }}>{dept.label}</div></div>
              </div>
            </div>
            <div style={{ padding: "12px 24px", borderBottom: `1px solid ${border}`, display: "flex", gap: 8, overflowX: "auto" }}>
              {[["info","ℹ️ Infos"],["floorplan","🗺️ Plan"],["menu","🍽️ Carte"],["checklist","✓ Checklist"]].map(([t, label]) => <button key={t} onClick={() => setDeptTab(t)} style={pill(dept.color, deptTab === t)}>{label}</button>)}
            </div>
            <div style={{ padding: 24 }}>
              {deptTab === "info" && (
                <div style={cardStyle(dept.color)}>
                  <div style={{ fontSize: 11, letterSpacing: 3, color: dept.color, textTransform: "uppercase", marginBottom: 10 }}>Informations</div>
                  <p style={{ margin: 0, fontSize: 15, lineHeight: 1.9, color: "#C8B896", whiteSpace: "pre-line" }}>{dept.info}</p>
                </div>
              )}
              {deptTab === "floorplan" && (
                dept.floorPlan
                  ? <img src={dept.floorPlan} alt="Plan de salle" style={{ width: "100%", borderRadius: 12, border: `1px solid ${dept.color}33` }} />
                  : <div style={{ textAlign: "center", padding: "60px 0" }}><div style={{ fontSize: 48, marginBottom: 16 }}>🗺️</div><div style={{ fontSize: 16, color: "#666" }}>Aucun plan disponible</div><div style={{ fontSize: 13, color: "#444", marginTop: 8 }}>Uploadez un plan depuis l'espace Admin</div></div>
              )}
              {deptTab === "menu" && dept.menu.categories.map((cat, ci) => (
                <div key={ci} style={{ marginBottom: 28 }}>
                  <div style={{ fontSize: 11, letterSpacing: 3, color: dept.color, textTransform: "uppercase", marginBottom: 12, paddingBottom: 8, borderBottom: `1px solid ${dept.color}30` }}>{cat.name}</div>
                  {cat.items.map((item, ii) => {
                    const key = `${ci}-${ii}`;
                    return (
                      <button key={ii} onClick={() => setExpandedItem(expandedItem === key ? null : key)}
                        style={{ width: "100%", background: expandedItem === key ? `${dept.color}12` : surface, border: `1px solid ${expandedItem === key ? dept.color + "44" : "rgba(255,255,255,0.06)"}`, borderRadius: 12, padding: "14px 16px", cursor: "pointer", textAlign: "left", marginBottom: 8, display: "block" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 15, fontWeight: 700, color: "#F0E8D8", marginBottom: 4 }}>{item.name}</div>
                            <div style={{ fontSize: 13, color: "#888", lineHeight: 1.5 }}>{item.desc}</div>
                            {expandedItem === key && item.allergens.length > 0 && (
                              <div style={{ marginTop: 10, display: "flex", flexWrap: "wrap", gap: 6 }}>
                                {item.allergens.map((a, ai) => <span key={ai} style={{ fontSize: 11, padding: "3px 10px", borderRadius: 20, background: "rgba(192,115,106,0.15)", border: "1px solid rgba(192,115,106,0.4)", color: "#C0736A" }}>{a}</span>)}
                              </div>
                            )}
                          </div>
                          {item.price && <div style={{ fontSize: 15, fontWeight: 700, color: dept.color, marginLeft: 12, flexShrink: 0 }}>{item.price}</div>}
                        </div>
                      </button>
                    );
                  })}
                </div>
              ))}
              {deptTab === "checklist" && (
                <div>
                  <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
                    {[["opening","☀️ Ouverture"],["closing","🌙 Fermeture"]].map(([t, label]) => <button key={t} onClick={() => setChecklistType(t)} style={pill(dept.color, checklistType === t)}>{label}</button>)}
                  </div>
                  <div style={{ ...cardStyle(dept.color), marginBottom: 20 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}><span style={{ fontSize: 13 }}>Progression</span><span style={{ fontSize: 18, fontWeight: 700, color: dept.color }}>{done}/{total}</span></div>
                    <div style={{ height: 5, background: "rgba(255,255,255,0.08)", borderRadius: 3, overflow: "hidden" }}><div style={{ height: "100%", width: `${total ? (done / total) * 100 : 0}%`, background: `linear-gradient(90deg, ${dept.color}, ${dept.color}88)`, transition: "width 0.3s" }} /></div>
                  </div>
                  {dept.checklists[checklistType].map((item, i) => {
                    const k = checkKey(i);
                    return (
                      <button key={i} onClick={() => toggleCheck(k)} style={{ display: "flex", alignItems: "center", gap: 14, background: checked[k] ? `${dept.color}12` : surface, border: `1px solid ${checked[k] ? dept.color + "44" : "rgba(255,255,255,0.06)"}`, borderRadius: 10, padding: "13px 14px", cursor: "pointer", textAlign: "left", width: "100%", marginBottom: 8 }}>
                        <div style={{ width: 22, height: 22, borderRadius: 6, flexShrink: 0, border: `2px solid ${checked[k] ? dept.color : "rgba(255,255,255,0.2)"}`, background: checked[k] ? dept.color : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, color: "#0A0805", fontWeight: 700 }}>{checked[k] ? "✓" : ""}</div>
                        <span style={{ fontSize: 14, color: checked[k] ? "#666" : "#C8B896", textDecoration: checked[k] ? "line-through" : "none", lineHeight: 1.5 }}>{item}</span>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
            <div style={bottomNav}><button onClick={() => { setView("home"); setActiveDept(null); }} style={{ flex: 1, background: "none", border: "none", color: "#888", cursor: "pointer", fontSize: 12, letterSpacing: 1 }}>← Accueil</button></div>
          </div>
        );
      }

      // GENERAL VIEW
      if (view === "general") return (
        <div style={wrap}>
          <div style={{ padding: "28px 24px 16px", borderBottom: `1px solid ${border}` }}>
            <button onClick={() => setView("home")} style={{ background: "none", border: "none", color: gold, cursor: "pointer", fontSize: 12, letterSpacing: 2, textTransform: "uppercase", padding: 0, marginBottom: 16 }}>← Retour</button>
            <div style={{ fontSize: 11, letterSpacing: 4, color: gold, textTransform: "uppercase" }}>F&B</div>
            <div style={{ fontSize: 22, fontWeight: 700 }}>Informations Générales</div>
          </div>
          <div style={{ padding: 24 }}>
            <div style={{ ...cardStyle(), marginBottom: 24 }}>
              <div style={{ fontSize: 11, letterSpacing: 3, color: gold, textTransform: "uppercase", marginBottom: 10 }}>Note du F&B Manager</div>
              <p style={{ margin: 0, fontSize: 15, lineHeight: 1.9, color: "#C8B896", whiteSpace: "pre-line" }}>{data.general.info}</p>
            </div>
            <div style={{ fontSize: 11, letterSpacing: 3, color: gold, textTransform: "uppercase", marginBottom: 12 }}>Plannings</div>
            {data.general.schedules.map((s, i) => (
              <div key={i} style={{ ...cardStyle(), marginBottom: 12 }}>
                <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 8 }}>{s.name}</div>
                <pre style={{ margin: 0, fontSize: 13, color: "#C8B896", whiteSpace: "pre-wrap", fontFamily: "inherit", lineHeight: 1.8 }}>{s.content}</pre>
              </div>
            ))}
            <div style={{ fontSize: 11, letterSpacing: 3, color: gold, textTransform: "uppercase", marginBottom: 12, marginTop: 24 }}>Annonces</div>
            {data.general.announcements.map((ann, i) => (
              <div key={i} style={{ background: `${gold}10`, border: `1px solid ${gold}33`, borderRadius: 14, padding: "16px 18px", marginBottom: 12 }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: gold, marginBottom: 6 }}>{ann.title}</div>
                <p style={{ margin: 0, fontSize: 14, color: "#C8B896", lineHeight: 1.7 }}>{ann.body}</p>
              </div>
            ))}
          </div>
          <div style={bottomNav}><button onClick={() => setView("home")} style={{ flex: 1, background: "none", border: "none", color: "#888", cursor: "pointer", fontSize: 12, letterSpacing: 1 }}>← Accueil</button></div>
        </div>
      );

      // HOME
      return (
        <div style={wrap}>
          <div style={{ position: "fixed", inset: 0, zIndex: 0, background: "radial-gradient(ellipse at 20% 0%, #1A1208 0%, #0A0805 60%)", pointerEvents: "none" }} />
          <div style={{ position: "relative", zIndex: 2, padding: "32px 24px 20px", borderBottom: `1px solid ${border}` }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 42, height: 42, background: `linear-gradient(135deg, ${gold}, #8B6534)`, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>⚜️</div>
                <div><div style={{ fontSize: 11, letterSpacing: 4, color: gold, textTransform: "uppercase" }}>Grand Hôtel Palace</div><div style={{ fontSize: 20, fontWeight: 700 }}>F&B Operations</div></div>
              </div>
              <button onClick={() => setView("admin")} style={{ background: "rgba(255,255,255,0.05)", border: `1px solid ${border}`, borderRadius: 10, padding: "8px 12px", cursor: "pointer", fontSize: 18 }}>⚙️</button>
            </div>
          </div>
          <div style={{ position: "relative", zIndex: 2, padding: "24px 24px 0" }}>
            <button onClick={() => setView("general")} style={{ width: "100%", background: `linear-gradient(135deg, ${gold}18, transparent)`, border: `1px solid ${gold}44`, borderRadius: 16, padding: "18px 20px", cursor: "pointer", textAlign: "left", marginBottom: 28, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div><div style={{ fontSize: 11, letterSpacing: 3, color: gold, textTransform: "uppercase", marginBottom: 6 }}>Général</div><div style={{ fontSize: 17, fontWeight: 700 }}>Plannings & Annonces</div><div style={{ fontSize: 13, color: "#888", marginTop: 4 }}>{data.general.announcements.length} annonce(s) active(s)</div></div>
              <div style={{ fontSize: 28 }}>📋</div>
            </button>
            <div style={{ fontSize: 11, letterSpacing: 4, color: gold, textTransform: "uppercase", marginBottom: 16 }}>Départements F&B</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {Object.entries(data.departments).map(([key, d]) => (
                <button key={key} onClick={() => { setActiveDept(key); setDeptTab("info"); setView("dept"); }} style={{ display: "flex", alignItems: "center", gap: 14, background: surface, border: `1px solid ${d.color}22`, borderRadius: 14, padding: "14px 16px", cursor: "pointer", textAlign: "left" }}>
                  <div style={{ width: 48, height: 48, borderRadius: 12, background: `${d.color}20`, border: `1px solid ${d.color}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, flexShrink: 0 }}>{d.icon}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 15, fontWeight: 700, color: "#F0E8D8" }}>{d.label}</div>
                    <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
                      <span style={{ fontSize: 11, color: "#666" }}>{d.menu.categories.reduce((a, c) => a + c.items.length, 0)} plats</span>
                      <span style={{ fontSize: 11, color: d.color }}>• {d.checklists.opening.length} points ouverture</span>
                    </div>
                  </div>
                  <div style={{ color: "#444", fontSize: 20 }}>›</div>
                </button>
              ))}
            </div>
          </div>
          <div style={bottomNav}>
            <button style={{ flex: 1, background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}><span style={{ fontSize: 18 }}>🍽️</span><span style={{ fontSize: 10, letterSpacing: 2, textTransform: "uppercase", color: gold }}>F&B</span></button>
            <button onClick={() => setView("admin")} style={{ flex: 1, background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}><span style={{ fontSize: 18 }}>⚙️</span><span style={{ fontSize: 10, letterSpacing: 2, textTransform: "uppercase", color: "#555" }}>Admin</span></button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
